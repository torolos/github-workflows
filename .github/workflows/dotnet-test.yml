# dotnet-test.yml
name: Reusable workflow for running tests in .NET

on: 
  workflow_call:
    inputs: 
      dotnet-version:
        required: true
        type: string
      test-project:
        required: true
        type: string
      verbosity:
        required: false
        type: string
        default: normal

jobs:
  build_and_run_tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          
      - name: Validate verbosity
        run: |
          case "${{ inputs.verbosity }}" in
            quiet|minimal|normal|detailed|diagnostic)
              echo "Valid verbosity"
              ;;
            *)
              echo "Invalid verbosity: ${{ inputs.verbosity }}"
              exit 1
              ;;
          esac

      - name: Run Tests
        run: dotnet test ${{ inputs.test-project }} --verbosity ${{ inputs.verbosity }}
